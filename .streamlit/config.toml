[theme]
base = "dark"
primaryColor = "#ff4444"
backgroundColor = "#0a0a0a"
secondaryBackgroundColor = "#1a1a1a"
textColor = "#e0e0e0"
font = "monospace"

[server]
headless = true
runOnSave = false

[browser]
gatherUsageStats = false

[client]
showSidebarNavigation = false
toolbarMode = "minimal"

[logger]
level = "error"

[runner]
magicEnabled = false